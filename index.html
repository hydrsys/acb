<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site ACB - Menu Mission</title>
    <style>
        :root {
            /* Couleurs extraites de la charte graphique logo_acb.pdf */
            --primary-color: #ed6d5f; 
            --dark-color: #130027;
            --font-main: 'Metropolis', sans-serif; /* Police mentionnée dans le doc */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main), Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Menu Fixé */
        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: white;
            z-index: 1000;
            padding-top: 20px;
        }

        /* Ligne fine avec dégradé (Fade out sur les bords) */
        .nav-separator {
            height: 1px;
            width: 100%;
            background: linear-gradient(to right, transparent, var(--dark-color), transparent);
            margin-top: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        /* Logo centré au-dessus */
        .logo-container {
            margin-bottom: 15px;
        }

        .logo-img {
            height: 60px; /* Ajustable selon le rendu souhaité */
            display: inline-block;
        }

        /* Menu centré */
        .navbar {
            display: flex;
            justify-content: center;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            position: relative;
            margin: 0 15px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--dark-color);
            font-weight: 500;
            font-size: 16px;
            padding: 10px 15px;
            display: block;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        /* Gestion du clic pour le sous-menu (Pure CSS) */
        #mission-toggle {
            display: none;
        }

        /* Sous-menu masqué par défaut */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            min-width: 200px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            padding: 10px 0;
            list-style: none;
            z-index: 1001;
            margin-top: 5px;
        }

        .dropdown-item a {
            text-decoration: none;
            color: var(--dark-color);
            padding: 10px 20px;
            display: block;
            font-size: 14px;
        }

        .dropdown-item a:hover {
            background-color: #f9f9f9;
            color: var(--primary-color);
        }

        /* Affichage au clic sur "Mission" */
        #mission-toggle:checked ~ .dropdown-menu {
            display: block;
        }

        /* Style spécifique pour l'onglet actif ou cliquable */
        .mission-label {
            cursor: pointer;
        }

        /* Contenu pour le scroll */
        .content {
            margin-top: 180px;
            padding: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="container">
            <div class="logo-container">
                <img src="images/logo.png" alt="Logo ACB" class="logo-img">
            </div>

            <nav>
                <ul class="navbar">
                    <li class="nav-item"><a href="#" class="nav-link">Présentation</a></li>
                    
                    <li class="nav-item">
                        <input type="checkbox" id="mission-toggle">
                        <label for="mission-toggle" class="nav-link mission-label">Mission ▾</label>
                        <ul class="dropdown-menu">
                            <li class="dropdown-item"><a href="#">Formations</a></li>
                            <li class="dropdown-item"><a href="#">Soutien aux églises</a></li>
                            <li class="dropdown-item"><a href="#">Accompagnement</a></li>
                        </ul>
                    </li>
                    
                    <li class="nav-item"><a href="#" class="nav-link">Nous soutenir</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Prise de rdv</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div class="nav-separator"></div>
    </header>

    <main class="content">
        <h1>Bienvenue</h1>
        <p>Bienvenue sur le site de l'ACB</p>
        <div style="height: 1000px;"></div> </main>

</body>
</html>
