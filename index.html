<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu ACB - Metropolis</title>
    <style>
        /* Définition de la police Metropolis */
        @font-face {
            font-family: 'Metropolis';
            src: url('fonts/Metropolis-Regular.woff2') format('woff2'); /* Ajuste le chemin vers ton fichier .ttf ou .woff */
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --main-color: #2c4c64;
            --font-family: 'Metropolis', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: #ffffff;
        }

        /* Menu Figé */
        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: white;
            z-index: 1000;
            padding: 15px 0;
        }

        .navbar-container {
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: relative;
        }

        /* 1. Logo en haut à gauche */
        .logo-box {
            flex-shrink: 0;
        }

        .logo-img {
            height: 50px; /* Taille du logo ACB */
            display: block;
        }

        /* 2. Menu CENTRÉ */
        .nav-center {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 30px;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            text-decoration: none;
            color: var(--main-color);
            font-size: 16px;
            cursor: pointer;
            padding: 10px 0;
            display: block;
            background: none;
            border: none;
            font-family: var(--font-family);
        }

        /* 3. Ligne toute fine avec dégradé */
        .nav-separator {
            height: 1px;
            width: 100%;
            margin-top: 15px;
            background: linear-gradient(to right, transparent, rgba(44, 76, 100, 0.5), transparent);
        }

        /* 4. Sous-menu au clic sur Mission */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            min-width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            padding: 15px 0;
            list-style: none;
            margin-top: 5px;
            z-index: 100;
        }

        .dropdown-item a {
            text-decoration: none;
            color: var(--main-color);
            padding: 10px 25px;
            display: block;
            font-size: 15px;
            transition: background 0.2s;
        }

        .dropdown-item a:hover {
            background-color: #f8f9fa;
        }

        /* Gestion de l'affichage au clic via checkbox invisible */
        #mission-toggle {
            display: none;
        }

        #mission-toggle:checked ~ .dropdown-menu {
            display: block;
        }

        /* Contenu de la page */
        .content {
            margin-top: 150px;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="navbar-container">
            <!-- Logo à gauche -->
            <div class="logo-box">
                <img src="images/logo.png" alt="Logo" class="logo-img">
            </div>

            <!-- Menu Centré -->
            <nav class="nav-center">
                <ul class="nav-links">
                    <li><a href="#" class="nav-link">Présentation</a></li>
                    
                    <li class="nav-item">
                        <input type="checkbox" id="mission-toggle">
                        <label for="mission-toggle" class="nav-link">Mission ▾</label>
                        <ul class="dropdown-menu">
                            <li class="dropdown-item"><a href="#">Formations</a></li>
                            <li class="dropdown-item"><a href="#">Soutien aux églises</a></li>
                            <li class="dropdown-item"><a href="#">Accompagnement</a></li>
                        </ul>
                    </li>

                    <li><a href="#" class="nav-link">Nous soutenir</a></li>
                    <li><a href="#" class="nav-link">Prise de rdv</a></li>
                    <li><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </div>

        <!-- Ligne fine dégradée -->
        <div class="nav-separator"></div>
    </header>

    <main class="content">
        <h1>Bienvenue sur votre site</h1>
        <p>Le logo est à gauche, le menu est centré et la police est Metropolis.</p>
    </main>

</body>
</html>
